        {{ ':green_circle:' if leak == 'off' else ':red_circle:' }} {{ "%-14s"|format(state_translated('binary_sensor.water_leak_sensor')) }}  Exec Bathroom
        {% set kpsi = states('sensor.kaeser_monitor_system_pressure') | float(0) -%}
