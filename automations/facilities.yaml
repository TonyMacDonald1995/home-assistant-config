- id: '1740600000002'
  alias: Air Quality Alert
  description: Notify #integration-sandbox when 3D print room air quality degrades or recovers
  triggers:
  - trigger: state
    entity_id: sensor.air_quality_overall_status
    to:
    - Poor
    - Dangerous
    for:
      minutes: 3
    id: degraded
  - trigger: state
    entity_id: sensor.air_quality_overall_status
    to:
    - Good
    - Moderate
    from:
    - Poor
    - Dangerous
    for:
      minutes: 5
    id: recovered
  actions:
  - variables:
      co2: '{{ states("sensor.air_quality_carbon_dioxide") }}'
      voc: '{{ states("sensor.air_quality_voc_index") }}'
      nox: '{{ states("sensor.air_quality_nox_index") }}'
      pm25: '{{ states("sensor.air_quality_pm2_5") }}'
      status: '{{ states("sensor.air_quality_overall_status") }}'
  - choose:
    - conditions:
      - condition: trigger
        id: degraded
      sequence:
      - action: notify.make_nashville
        data:
          target: "#integration-sandbox"
          message: >
            {% if status == 'Dangerous' %}:no_entry:{% else %}:warning:{% endif %} *3D Print Room Air Quality: {{ status }}*
            CO2: {{ co2 }} ppm | VOC: {{ voc }} | NOx: {{ nox }} | PM2.5: {{ pm25 }} ug/m3.
            {% if status == 'Dangerous' %}Ventilate immediately — stop printing if possible.{% else %}Increase ventilation. Open doors or windows.{% endif %}
            {% set not_printing = ['unavailable','idle','offline','finish','failed','completed','stopped','error','unknown','prepare'] -%}
            {% set ns = namespace(active=[]) -%}
            {% for p in ['kiwi','mango','papaya','strawberry','huckleberry','pineapple'] -%}
            {% if states('sensor.' ~ p ~ '_print_status') not in not_printing -%}
            {% set ns.active = ns.active + [p | capitalize] -%}
            {% endif -%}
            {% endfor -%}
            :printer: Printers running: {{ ns.active | join(', ') if ns.active else 'none' }}
          data:
            username: Air Quality
            icon: air_filter
    - conditions:
      - condition: trigger
        id: recovered
      sequence:
      - action: notify.make_nashville
        data:
          target: "#integration-sandbox"
          message: ':white_check_mark: CO2: {{ co2 }} ppm | VOC: {{ voc }} | PM2.5: {{ pm25 }} ug/m3 — 3D print room air quality has returned to {{ status }}.'
          data:
            username: Air Quality
            icon: air_filter
  mode: single
- id: water_leak_alert
  alias: Water Leak Alert
  description: Alert on water leak detection or clearance in Exec Bathroom
  triggers:
  - trigger: state
    entity_id: binary_sensor.water_leak_sensor
    to: 'on'
    id: leak_detected
  - trigger: state
    entity_id: binary_sensor.water_leak_sensor
    to: 'off'
    from: 'on'
    id: leak_cleared
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: leak_detected
      sequence:
      - action: notify.make_nashville
        data:
          target: "#facilities-feed"
          message: |
            :rotating_light: *Water Leak Detected — Exec Bathroom*
            *{{ now().strftime('%a, %b %-d  %-I:%M %p') }}*
            Check the executive bathroom immediately.
          data:
            username: Facilities Pulse
            icon: warning
    - conditions:
      - condition: trigger
        id: leak_cleared
      sequence:
      - action: notify.make_nashville
        data:
          target: "#facilities-feed"
          message: |
            :white_check_mark: *Water Leak Cleared — Exec Bathroom*
            *{{ now().strftime('%a, %b %-d  %-I:%M %p') }}*
          data:
            username: Facilities Pulse
            icon: warning
  mode: single
- id: water_leak_sensor_health
  alias: Water Leak Sensor Health
  description: Alert when water leak sensor has been unavailable for 6 hours
  triggers:
  - trigger: state
    entity_id: binary_sensor.water_leak_sensor
    to: unavailable
    for:
      hours: 6
  actions:
  - action: notify.make_nashville
    data:
      target: "#facilities-feed"
      message: |
        :grey_question: *Water Leak Sensor Offline — Exec Bathroom*
        The sensor has been unavailable for 6+ hours.
        *{{ now().strftime('%a, %b %-d  %-I:%M %p') }}*
      data:
        username: Facilities Pulse
        icon: warning
  mode: single

- id: warehouse_heat_daily_reset
  alias: Warehouse Heat — Daily Reset
  description: Clear the morning-fired flag at midnight so it's fresh each day
  triggers:
  - trigger: time
    at: "00:00:00"
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.warehouse_heat_morning_fired
  mode: single

- id: warehouse_heat_realtime_warm
  alias: Warehouse Heat — Real-time (Warm)
  description: Alert members when indoor heat index crosses 88°F (warm tier)
  triggers:
  - trigger: numeric_state
    entity_id: sensor.warehouse_max_heat_index
    above: 88
    for:
      minutes: 10
  conditions:
  - condition: template
    value_template: >
      {% set last = this.attributes.last_triggered %}
      {{ last is none or (now() - last).total_seconds() > 14400 }}
  actions:
  - variables:
      hottest: "{{ state_attr('sensor.warehouse_max_heat_index', 'hottest_area') }}"
      hi: "{{ states('sensor.warehouse_max_heat_index') | float(0) | round(0) | int }}"
  - action: notify.make_nashville
    data:
      target: "#climate-feed"
      message: |
        :warning: *Warehouse is heating up*
        *{{ hottest }}* is at *{{ hi }}°F heat index* — it's officially uncomfortable in there. Hydrate and take breaks if you're working.
      data:
        username: Heat Watch
        icon: sun_with_face
  mode: single

- id: warehouse_heat_realtime_hot
  alias: Warehouse Heat — Real-time (Hot)
  description: Alert members when indoor heat index crosses 95°F (hot tier) — fires independently of warm-tier cooldown
  triggers:
  - trigger: numeric_state
    entity_id: sensor.warehouse_max_heat_index
    above: 95
    for:
      minutes: 10
  conditions:
  - condition: template
    value_template: >
      {% set last = this.attributes.last_triggered %}
      {{ last is none or (now() - last).total_seconds() > 14400 }}
  actions:
  - variables:
      hottest: "{{ state_attr('sensor.warehouse_max_heat_index', 'hottest_area') }}"
      hi: "{{ states('sensor.warehouse_max_heat_index') | float(0) | round(0) | int }}"
  - action: notify.make_nashville
    data:
      target: "#climate-feed"
      message: |
        :fire: *Warehouse is HOT*
        *{{ hottest }}* is at *{{ hi }}°F heat index*. Take it seriously — drink water, take breaks, watch for signs of heat exhaustion in yourself and others.
      data:
        username: Heat Watch
        icon: fire
  mode: single

- id: warehouse_heat_midday_confirmation
  alias: Warehouse Heat — Midday Confirmation
  description: Confirm the morning prediction at 12:30pm if it's actually hot now
  triggers:
  - trigger: time
    at: "12:30:00"
  conditions:
  - condition: state
    entity_id: input_boolean.warehouse_heat_morning_fired
    state: "on"
  - condition: template
    value_template: >
      {{ states('input_datetime.warehouse_heat_morning_fired_at') == now().strftime('%Y-%m-%d') }}
  - condition: numeric_state
    entity_id: sensor.warehouse_max_heat_index
    above: 88
  actions:
  - variables:
      hottest: "{{ state_attr('sensor.warehouse_max_heat_index', 'hottest_area') }}"
      hi: "{{ states('sensor.warehouse_max_heat_index') | float(0) | round(0) | int }}"
  - action: notify.make_nashville
    data:
      target: "#climate-feed"
      message: |
        :fire: *Yep, it's hot in here*
        Right now the *{{ hottest }}* is the warmest at *{{ hi }}°F heat index*. Take breaks, hydrate, look out for each other.
      data:
        username: Heat Watch
        icon: fire
  mode: single

- id: warehouse_heat_morning_headsup
  alias: Warehouse Climate — Daily Forecast
  description: 7am daily forecast post; tiered messaging (chilly/comfortable/hot) and sets helpers on hot days
  triggers:
  - trigger: time
    at: "07:00:00"
  actions:
  - action: weather.get_forecasts
    data:
      type: hourly
    target:
      entity_id: weather.forecast_home
    response_variable: weather_response
  - variables:
      forecast_today: >
        {% set entries = weather_response['weather.forecast_home'].forecast | default([]) %}
        {% set today = now().date() %}
        {% set ns = namespace(items=[]) %}
        {% for e in entries %}
          {% set dt = e.datetime | as_datetime %}
          {% if dt.date() == today and dt.hour >= 9 and dt.hour <= 20 %}
            {% set t = e.temperature | float(0) %}
            {% set rh = e.humidity | float(0) %}
            {% if t < 80 %}
              {% set hi = t %}
            {% else %}
              {% set hi = -42.379
                + 2.04901523 * t
                + 10.14333127 * rh
                - 0.22475541 * t * rh
                - 0.00683783 * t * t
                - 0.05481717 * rh * rh
                + 0.00122874 * t * t * rh
                + 0.00085282 * t * rh * rh
                - 0.00000199 * t * t * rh * rh %}
            {% endif %}
            {% set ns.items = ns.items + [{'hi': hi, 'hour': dt.hour, 'temp': t, 'rh': rh}] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
      peak_hi: >
        {% set hi_values = forecast_today | map(attribute='hi') | list %}
        {{ (hi_values | max | round(0) | int) if hi_values else 0 }}
      peak_hour: >
        {% set sorted = forecast_today | sort(attribute='hi', reverse=true) | list %}
        {{ sorted[0].hour if sorted else 0 }}
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ peak_hi >= 88 }}"
      sequence:
      - action: notify.make_nashville
        data:
          target: "#climate-feed"
          message: |
            :sun_with_face: *Heads up — it's going to be hot today*
            Forecast peak: *{{ peak_hi }}°F heat index* around {{ (peak_hour % 12) if (peak_hour % 12) != 0 else 12 }}{{ 'am' if peak_hour < 12 else 'pm' }}.
            The warehouse usually runs warmer than outside. Dress light, bring water, plan breaks.
          data:
            username: Heat Watch
            icon: sun_with_face
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.warehouse_heat_morning_fired
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.warehouse_heat_morning_fired_at
        data:
          date: "{{ now().strftime('%Y-%m-%d') }}"
    - conditions:
      - condition: template
        value_template: "{{ peak_hi >= 65 and peak_hi < 88 }}"
      sequence:
      - action: notify.make_nashville
        data:
          target: "#climate-feed"
          message: |
            :sun_with_face: *Today's forecast: peak around {{ peak_hi }}°F*
            Comfortable conditions in the warehouse.
          data:
            username: Heat Watch
            icon: sun_with_face
    - conditions:
      - condition: template
        value_template: "{{ peak_hi > 0 and peak_hi < 65 }}"
      sequence:
      - action: notify.make_nashville
        data:
          target: "#climate-feed"
          message: |
            :cold_face: *Today's forecast: peak around {{ peak_hi }}°F*
            Chilly day ahead — layer up if you're stopping by.
          data:
            username: Heat Watch
            icon: cold_face
  mode: single

- id: warehouse_heat_hourly_status
  alias: Warehouse Heat — Hourly Status
  description: Hourly per-area temp/humidity/heat-index post to #climate-feed while the max indoor heat index is above 80°F
  triggers:
  - trigger: time_pattern
    hours: /1
  conditions:
  - condition: numeric_state
    entity_id: sensor.warehouse_max_heat_index
    above: 80
  actions:
  - variables:
      indoor_areas:
        - name: Woodshop
          temp: sensor.woodshop_climate_sensor_temperature
          humidity: sensor.woodshop_climate_sensor_humidity
          hi: sensor.woodshop_heat_index
        - name: 3D Print Room
          temp: sensor.air_quality_temperature
          humidity: sensor.air_quality_humidity
          hi: sensor.3d_print_heat_index
        - name: Ceramics
          temp: sensor.ceramics_climate_sensor_temperature
          humidity: sensor.ceramics_climate_sensor_humidity
          hi: sensor.ceramics_heat_index
        - name: Front Hallway
          temp: sensor.front_hallway_climate_sensor_temperature
          humidity: sensor.front_hallway_climate_sensor_humidity
          hi: sensor.front_hallway_heat_index
  - action: notify.make_nashville
    data:
      target: "#climate-feed"
      data:
        username: Heat Watch
        icon: fire
      message: |
        :fire: *Warehouse Climate — Hourly*
        *{{ now().strftime('%a, %b %-d  %-I:%M %p') }}*

        Hottest: *{{ state_attr('sensor.warehouse_max_heat_index', 'hottest_area') }}* — {{ states('sensor.warehouse_max_heat_index') | float(0) | round(0) | int }}°F HI

        {% for a in indoor_areas -%}
        {% set t_raw = states(a.temp) -%}
        {% set h_raw = states(a.humidity) -%}
        {% set hi_raw = states(a.hi) -%}
        {% if t_raw not in ['unknown','unavailable',none] and h_raw not in ['unknown','unavailable',none] and hi_raw not in ['unknown','unavailable',none] -%}
        {% set t = t_raw | float(0) -%}
        {% set h = h_raw | float(0) -%}
        {% set hi = hi_raw | float(0) -%}
        {% set icon = ':red_circle:' if hi >= 103 else ':large_orange_circle:' if hi >= 90 else ':yellow_circle:' if hi >= 80 else ':green_circle:' -%}
        {{ icon }} {{ "%-17s"|format(a.name) }} {{ "%.1f°F"|format(t) }}  {{ h | round(0) | int }}%  → {{ hi | round(0) | int }}°F HI
        {% endif -%}
        {% endfor -%}
        {% set ot = state_attr('weather.forecast_home','temperature') | float(0) -%}
        {% set orh = state_attr('weather.forecast_home','humidity') | float(0) -%}
        {% if ot < 80 -%}
        {% set out_hi = ot -%}
        {% else -%}
        {% set out_hi = -42.379
          + 2.04901523 * ot
          + 10.14333127 * orh
          - 0.22475541 * ot * orh
          - 0.00683783 * ot * ot
          - 0.05481717 * orh * orh
          + 0.00122874 * ot * ot * orh
          + 0.00085282 * ot * orh * orh
          - 0.00000199 * ot * ot * orh * orh -%}
        {% endif -%}
        :partly_sunny: {{ "%-17s"|format('Outside') }} {{ "%.1f°F"|format(ot) }}  {{ orh | round(0) | int }}%  → {{ out_hi | round(0) | int }}°F HI
  mode: single
