- id: '1740600000002'
  alias: Air Quality Alert
  description: Notify #integrations_sandbox when 3D print room air quality degrades or recovers
  triggers:
  - trigger: state
    entity_id: sensor.air_quality_overall_status
    to:
    - Poor
    - Dangerous
    for:
      minutes: 3
    id: degraded
  - trigger: state
    entity_id: sensor.air_quality_overall_status
    to:
    - Good
    - Moderate
    from:
    - Poor
    - Dangerous
    for:
      minutes: 5
    id: recovered
  actions:
  - variables:
      co2: '{{ states("sensor.air_quality_carbon_dioxide") }}'
      voc: '{{ states("sensor.air_quality_voc_index") }}'
      nox: '{{ states("sensor.air_quality_nox_index") }}'
      pm25: '{{ states("sensor.air_quality_pm2_5") }}'
      status: '{{ states("sensor.air_quality_overall_status") }}'
  - choose:
    - conditions:
      - condition: trigger
        id: degraded
      sequence:
      - action: notify.make_nashville
        data:
          target: "#integrations_sandbox"
          message: >
            {% if status == 'Dangerous' %}:no_entry:{% else %}:warning:{% endif %} *3D Print Room Air Quality: {{ status }}*
            CO2: {{ co2 }} ppm | VOC: {{ voc }} | NOx: {{ nox }} | PM2.5: {{ pm25 }} ug/m3.
            {% if status == 'Dangerous' %}Ventilate immediately — stop printing if possible.{% else %}Increase ventilation. Open doors or windows.{% endif %}
            {% set not_printing = ['unavailable','idle','offline','finish','failed','completed','stopped','error','unknown','prepare'] -%}
            {% set ns = namespace(active=[]) -%}
            {% for p in ['kiwi','mango','papaya','strawberry','huckleberry','pineapple'] -%}
            {% if states('sensor.' ~ p ~ '_print_status') not in not_printing -%}
            {% set ns.active = ns.active + [p | capitalize] -%}
            {% endif -%}
            {% endfor -%}
            :printer: Printers running: {{ ns.active | join(', ') if ns.active else 'none' }}
          data:
            username: Air Quality
            icon: air_filter
    - conditions:
      - condition: trigger
        id: recovered
      sequence:
      - action: notify.make_nashville
        data:
          target: "#integrations_sandbox"
          message: ':white_check_mark: CO2: {{ co2 }} ppm | VOC: {{ voc }} | PM2.5: {{ pm25 }} ug/m3 — 3D print room air quality has returned to {{ status }}.'
          data:
            username: Air Quality
            icon: air_filter
  mode: single
- id: water_leak_alert
  alias: Water Leak Alert
  description: Alert on water leak detection or clearance in Exec Bathroom
  triggers:
  - trigger: state
    entity_id: binary_sensor.water_leak_sensor
    to: 'on'
    id: leak_detected
  - trigger: state
    entity_id: binary_sensor.water_leak_sensor
    to: 'off'
    from: 'on'
    id: leak_cleared
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: leak_detected
      sequence:
      - action: notify.make_nashville
        data:
          target: "#facilities-feed"
          message: |
            :rotating_light: *Water Leak Detected — Exec Bathroom*
            *{{ now().strftime('%a, %b %-d  %-I:%M %p') }}*
            Check the executive bathroom immediately.
          data:
            username: Facilities Pulse
            icon: warning
    - conditions:
      - condition: trigger
        id: leak_cleared
      sequence:
      - action: notify.make_nashville
        data:
          target: "#facilities-feed"
          message: |
            :white_check_mark: *Water Leak Cleared — Exec Bathroom*
            *{{ now().strftime('%a, %b %-d  %-I:%M %p') }}*
          data:
            username: Facilities Pulse
            icon: warning
  mode: single
- id: water_leak_sensor_health
  alias: Water Leak Sensor Health
  description: Alert when water leak sensor has been unavailable for 6 hours
  triggers:
  - trigger: state
    entity_id: binary_sensor.water_leak_sensor
    to: unavailable
    for:
      hours: 6
  actions:
  - action: notify.make_nashville
    data:
      target: "#facilities-feed"
      message: |
        :grey_question: *Water Leak Sensor Offline — Exec Bathroom*
        The sensor has been unavailable for 6+ hours.
        *{{ now().strftime('%a, %b %-d  %-I:%M %p') }}*
      data:
        username: Facilities Pulse
        icon: warning
  mode: single

- id: warehouse_heat_morning_headsup
  alias: Warehouse Climate — Daily Forecast
  description: 7am daily forecast post; tiered messaging (chilly/comfortable/warm) based on forecast peak temperature
  triggers:
  - trigger: time
    at: "07:00:00"
  actions:
  - action: weather.get_forecasts
    data:
      type: hourly
    target:
      entity_id: weather.forecast_home
    response_variable: weather_response
  - variables:
      forecast_today: >
        {% set entries = weather_response['weather.forecast_home'].forecast | default([]) %}
        {% set today = now().date() %}
        {% set ns = namespace(items=[]) %}
        {% for e in entries %}
          {% set dt = e.datetime | as_datetime %}
          {% if dt.date() == today and dt.hour >= 9 and dt.hour <= 20 %}
            {% set ns.items = ns.items + [{'temp': e.temperature | float(0), 'hour': dt.hour}] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
      peak_temp: >
        {% set temps = forecast_today | map(attribute='temp') | list %}
        {{ (temps | max | round(0) | int) if temps else 0 }}
      peak_hour: >
        {% set sorted = forecast_today | sort(attribute='temp', reverse=true) | list %}
        {{ sorted[0].hour if sorted else 0 }}
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ peak_temp >= 80 }}"
      sequence:
      - action: notify.make_nashville
        data:
          target: "#climate-feed"
          message: |
            :sun_with_face: *Heads up — it's going to be warm today*
            Forecast peak: *{{ peak_temp }}°F* around {{ (peak_hour % 12) if (peak_hour % 12) != 0 else 12 }}{{ 'am' if peak_hour < 12 else 'pm' }}.
            The warehouse usually runs warmer than outside. Dress light, bring water, plan breaks.
          data:
            username: Climate Watch
            icon: sun_with_face
    - conditions:
      - condition: template
        value_template: "{{ peak_temp >= 65 and peak_temp < 80 }}"
      sequence:
      - action: notify.make_nashville
        data:
          target: "#climate-feed"
          message: |
            :sun_with_face: *Today's forecast: peak around {{ peak_temp }}°F*
            Comfortable conditions in the warehouse.
          data:
            username: Climate Watch
            icon: sun_with_face
    - conditions:
      - condition: template
        value_template: "{{ peak_temp > 0 and peak_temp < 65 }}"
      sequence:
      - action: notify.make_nashville
        data:
          target: "#climate-feed"
          message: |
            :cold_face: *Today's forecast: peak around {{ peak_temp }}°F*
            Chilly day ahead — layer up if you're stopping by.
          data:
            username: Climate Watch
            icon: cold_face
  mode: single

- id: warehouse_heat_hourly_status
  alias: Warehouse Climate — Hourly Status
  description: Hourly per-area temperature/humidity post to #climate-feed while the max indoor temperature is above 80°F
  triggers:
  - trigger: time_pattern
    hours: /1
  conditions:
  - condition: numeric_state
    entity_id: sensor.warehouse_max_temperature
    above: 80
  actions:
  - variables:
      indoor_areas:
        - name: Woodshop
          temp: sensor.woodshop_climate_sensor_temperature
          humidity: sensor.woodshop_climate_sensor_humidity
        - name: 3D Print Room
          temp: sensor.air_quality_temperature
          humidity: sensor.air_quality_humidity
        - name: Ceramics
          temp: sensor.ceramics_climate_sensor_temperature
          humidity: sensor.ceramics_climate_sensor_humidity
        - name: Front Hallway
          temp: sensor.front_hallway_climate_sensor_temperature
          humidity: sensor.front_hallway_climate_sensor_humidity
  - action: notify.make_nashville
    data:
      target: "#climate-feed"
      data:
        username: Climate Watch
        icon: sun_with_face
      message: |
        {% set max_temp = states('sensor.warehouse_max_temperature') | float(0) -%}
        {% set title_icon = ':fire:' if max_temp >= 95 else ':hot_face:' if max_temp >= 88 else ':sun_with_face:' -%}
        {% set care_line = '\nDangerous heat. Limit time in there. Watch yourselves and each other.' if max_temp >= 95 else '\nStress conditions. Water, breaks, check on each other.' if max_temp >= 88 else '' -%}
        {{ title_icon }} *Warehouse Climate — Hourly*
        *{{ now().strftime('%a, %b %-d  %-I:%M %p') }}*

        Currently warmest: *{{ state_attr('sensor.warehouse_max_temperature', 'hottest_area') }}* — {{ max_temp | round(0) | int }}°F

        {% for a in indoor_areas -%}
        {% set t_raw = states(a.temp) -%}
        {% set h_raw = states(a.humidity) -%}
        {% if t_raw not in ['unknown','unavailable',none] and h_raw not in ['unknown','unavailable',none] -%}
        {% set t = t_raw | float(0) -%}
        {% set h = h_raw | float(0) -%}
        {% set icon = ':rotating_light:' if t >= 95 else ':hot_face:' if t >= 88 else ':warning:' if t >= 82 else ':white_check_mark:' -%}
        {{ icon }} {{ "%-17s"|format(a.name) }} {{ "%.1f°F"|format(t) }}  {{ h | round(0) | int }}%
        {% endif -%}
        {% endfor -%}
        {% set ot = state_attr('weather.forecast_home','temperature') | float(0) -%}
        {% set orh = state_attr('weather.forecast_home','humidity') | float(0) -%}
        {% set out_icon = ':rotating_light:' if ot >= 95 else ':hot_face:' if ot >= 88 else ':warning:' if ot >= 82 else ':white_check_mark:' -%}
        {{ out_icon }} {{ "%-17s"|format('Outside') }} {{ "%.1f°F"|format(ot) }}  {{ orh | round(0) | int }}%
        {{ care_line -}}
  mode: single
