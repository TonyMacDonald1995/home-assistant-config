esphome:
  name: emporia-vue

external_components:
  - source: github://emporia-vue-local/esphome@dev
    components:
      - emporia_vue

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

# Enable logging
logger:
    logs:
    # by default, every reading will be printed to the UART, which is very slow
    # This will disable printing the readings but keep other helpful messages
      sensor: INFO

# Enable Home Assistant API
api:
  encryption:
    key: !secret emporia_vue_encryption_key

ota:
    platform: esphome
    password: !secret emporia_vue_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    light.turn_on: wifi_led
  on_disconnect:
    light.turn_off: wifi_led
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Emporia-Vue Fallback Hotspot"
    password: "EJyrjEUNc5Ia"

captive_portal:

preferences:
  # please also make sure `restore: false` is set on all `platform: total_daily_energy`
  # sensors below.
  flash_write_interval: "48h"

i2c:
  sda: 
    number: 5
    ignore_strapping_warning: true
  scl: 18
  scan: false
  frequency: 400kHz
  timeout: 1ms
  id: i2c_a

switch:
  - platform: restart
    name: Restart 

light:
  - platform: status_led
    id: wifi_led
    pin:
      number: 2
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: status_led
    id: ethernet_led
    pin: 4
    restore_mode: RESTORE_DEFAULT_ON


time:
  - platform: homeassistant

# these are called references in YAML. They allow you to reuse
# this configuration in each sensor, while only defining it once
.defaultfilters:
  - &moving_avg
    # we capture a new sample every 0.24 seconds, so the time can
    # be calculated from the number of samples as n * 0.24.
    sliding_window_moving_average:
      # we average over the past 2.88 seconds
      window_size: 24
      # we push a new value every 1.44 seconds
      send_every: 12
  - &max_of_last_N
    max:
      window_size: 9
      send_every: 5
  - &invert
    # invert and filter out any values below 0.
    lambda: 'return max(-x, 0.0f);'
  - &pos
    # filter out any values below 0.
    lambda: 'return max(x, 0.0f);'
  - &abs
    # take the absolute value of the value
    lambda: 'return abs(x);'


# Provide diagnostic information about the platform.
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

sensor:
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""

  # Configure the sensor code provided by the emporia_vue platform

  - platform: emporia_vue
    i2c_id: i2c_a
    variant: vue3

    # These are the phase ABC voltage measurements, measured from the green 5-position terminal block
    phases:
      - id: phase_a  # Verify that this specific phase/leg is connected to correct input wire color on device listed below
        input: BLACK  # Vue device wire color, match to connected wire color on voltage sensing harness
        #     calibration: 0.0192775  # 0.022 is used as the default as starting point but may need adjusted to ensure accuracy
        #     # To calculate new calibration value use the formula <in-use calibration value> * <accurate voltage> / <reporting voltage>
        voltage:
          internal: true  # Do not report to HA
          name: "Phase A Voltage"
          filters: []

      - id: phase_b  # Verify that this specific phase/leg is connected to correct input wire color on device listed below
        input: RED  # Vue device wire color, match to connected wire color on voltage sensing harness
        #   calibration: 0.0192775  # 0.022 is used as the default as starting point but may need adjusted to ensure accuracy 
        voltage:
          internal: true  # Do not report to HA
          name: "Phase B Voltage"
          filters: []
        phase_angle:
          internal: true  # Do not report to HA
          name: "Phase B Phase Angle"
          filters: []

      - id: phase_c  # Verify that this specific phase/leg is connected to correct input wire color on device listed below
        input: BLUE  # Vue device wire color, match to connected wire color on voltage sensing harness
        #   calibration: 0.0192775  # 0.022 is used as the default as starting point but may need adjusted to ensure accuracy
        voltage:
          internal: true  # Do not report to HA
          name: "Phase C Voltage"
          filters: []
        phase_angle:
          internal: true  # Do not report to HA
          name: "Phase C Phase Angle"
          filters: []

    # These are all the current measurements, from all the CTs
    # THE ONLY CHANGE YOU SHOULD MAKE TO CT_CLAMPS IS THE APPROPRIATE "phase_id". FOR ANYTHING ELSE, CREATE/EDIT A COPIED SENSOR OR TEMPLATE
    ct_clamps:
      # Because these only have id set, but no name, ESPHome implicitly sets 'internal' to True.
      #     This means they don't push each value to HA, but they can get used elsewhere. 

      # - { phase_id: ???, input:  "A", current: { id:  cirA_current, filters: [] }, power: { id: cirA_power, filters: [] } }
      - { phase_id: phase_b, input:  "B", current: { id:  cirB_current, filters: [] }, power: { id: cirB_power, filters: [] } }
      - { phase_id: phase_c, input:  "C", current: { id:  cirC_current, filters: [] }, power: { id: cirC_power, filters: [] } }

      - { phase_id: phase_a, input:  "1", current: { id:  cir1_current, filters: [ ] }, power: { id: cir1_power, filters: [] } }
      - { phase_id: phase_b, input:  "2", current: { id:  cir2_current, filters: [ ] }, power: { id: cir2_power, filters: [] } }
      - { phase_id: phase_c, input:  "3", current: { id:  cir3_current, filters: [ ] }, power: { id: cir3_power, filters: [] } }
      - { phase_id: phase_b, input:  "4", current: { id:  cir4_current, filters: [ ] }, power: { id: cir4_power, filters: [] } }
      # - { phase_id: ???, input:  "5", current: { id:  cir5_current, filters: [] }, power: { id:  cir5_power, filters: [] } }
      # - { phase_id: ???, input:  "6", current: { id:  cir6_current, filters: [] }, power: { id:  cir6_power, filters: [] } }
      # - { phase_id: ???, input:  "7", current: { id:  cir7_current, filters: [] }, power: { id:  cir7_power, filters: [] } }
      # - { phase_id: ???, input:  "8", current: { id:  cir8_current, filters: [] }, power: { id:  cir8_power, filters: [] } }
      # - { phase_id: ???, input:  "9", current: { id:  cir9_current, filters: [] }, power: { id:  cir9_power, filters: [] } }
      # - { phase_id: ???, input: "10", current: { id:  cir10_current, filters: [] }, power: { id: cir10_power, filters: [] } }
      # - { phase_id: ???, input: "11", current: { id:  cir11_current, filters: [] }, power: { id: cir11_power, filters: [] } }
      # - { phase_id: ???, input: "12", current: { id:  cir12_current, filters: [] }, power: { id: cir12_power, filters: [] } }
      # - { phase_id: ???, input: "13", current: { id:  cir13_current, filters: [] }, power: { id: cir13_power, filters: [] } }
      # - { phase_id: ???, input: "14", current: { id:  cir14_current, filters: [] }, power: { id: cir14_power, filters: [] } }
      # - { phase_id: ???, input: "15", current: { id:  cir15_current, filters: [] }, power: { id: cir15_power, filters: [] } }
      # - { phase_id: ???, input: "16", current: { id:  cir16_current, filters: [] }, power: { id: cir16_power, filters: [] } }

    
    on_update:
      then:
        # Force templates to update with new values
        - component.update: indoor_ac_air_handler_current
        - component.update: indoor_ac_total_current

  # All three phases of the air handler are instrumented. However, if we're most interested in 
  #     peak current, we really only care about whichever phase is highest. So at each update(), 
  #     just look the max of all three sensors.
  - platform: template
    # We do NOT name this template, because we're doing a bunch of filtering and combining.
    # If we named, published, and filtered this template, then ac_total_current could use 
    # (e.g.) the air handler current max from sample i, but the compressor current max from sample i+3
    lambda: 'return max(max(id(cir1_current).state, id(cir2_current).state), id(cir3_current).state);'
    id: indoor_ac_air_handler_current
    device_class: current # I think device_class is needed bc a lambda can theoretically return any type of value
    state_class: measurement
    unit_of_measurement: A
    filters: []

  # Basically this just remaps the compressor to current to cirC_current
  - platform: copy
    id: indoor_ac_compressor_current
    source_id: cirC_current
    filters: []
    
  # Create an artificial sensor for all indoor AC current consumption, that's just the sum of 
  #   both the indoor and outdoor unit's sensors.
  - platform: template
    lambda: 'return id(indoor_ac_air_handler_current).state + id(indoor_ac_compressor_current).state;'
    id: indoor_ac_total_current
    state_class: measurement
    unit_of_measurement: A
    device_class: current # Without "device_class: current", home assistant doesn't plot this value on a Y-axis
    filters: []



  - { platform: copy, name:  "Leon Russell", source_id: cirB_current, filters: [ *max_of_last_N ] }
  - { platform: copy, name:  "Lighting Circuit 1", source_id:  cir4_current, filters: [ *moving_avg ] }

  - { platform: copy, name:  "Indoor AC Air Handler Current", source_id:  indoor_ac_air_handler_current, filters: [ *max_of_last_N ] }
  - { platform: copy, name:  "Indoor AC Compressor Current",  source_id:  indoor_ac_compressor_current,  filters: [ *max_of_last_N ] }
  - { platform: copy, name:  "Indoor AC Total Current",       source_id:  indoor_ac_total_current,       filters: [ *max_of_last_N ] }
  # - { platform: copy, name:  "Circuit 5 Power", source_id:  cir5, filters: *moving_avg }
  # - { platform: copy, name:  "Circuit 6 Power", source_id:  cir6, filters: *moving_avg }


